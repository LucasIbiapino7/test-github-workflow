<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            background: #238636;
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: #58a6ff;
        }

        p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .info {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.25rem 2rem;
            display: inline-block;
            text-align: left;
        }

        .info span {
            color: #8b949e;
            font-size: 0.85rem;
        }

        .info strong {
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">deploy realizado com sucesso</div>
        <div class="info">
            <span>Projeto: </span><strong>wanda-cicd-test</strong><br>
        </div>
    </div>
</body>
</html>
